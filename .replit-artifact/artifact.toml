kind = "web"
previewPath = "/"
title = "Sierra Estates"
version = "1.0.0"
id = "artifacts/sierra-estates"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20466

[services.development]
run = "pnpm --filter @workspace/sierra-estates run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sierra-estates", "run", "build" ]
publicDir = "artifacts/sierra-estates/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20466"
BASE_PATH = "/"
